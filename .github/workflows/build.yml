name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: docker.io/hualet/deepin:25.1-builder
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            cmake \
            build-essential \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            libdtk6widget-dev \
            libdtk6core-dev \
            libdtk6gui-dev \
            libdtk6core-bin \
            libfcitx5core-dev \
            libopenblas-dev \
            pipewire-bin

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=/usr -DECHOFLOW_CPU_TARGET=x86-64-v3

      - name: Build
        run: cmake --build build --parallel "$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Stage install tree
        run: DESTDIR="${PWD}/stage" cmake --install build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: echoflow-install-tree
          path: stage/usr/
